# Kiểm tra build và test .NET + Go (không cần Docker trên runner).
name: CI

on:
  push:
  pull_request:

jobs:
  dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: dotnet test
        run: dotnet test DockLite.slnx -c Release --verbosity minimal
        working-directory: .

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wsl-docker-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: wsl-docker-service/go.mod
          cache-dependency-path: wsl-docker-service/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build server
        run: go build -o /tmp/docklite-wsl ./cmd/server

  go-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wsl-docker-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: wsl-docker-service/go.mod
          cache-dependency-path: wsl-docker-service/go.sum
      - name: Docker daemon
        run: docker info
      - name: go test -tags=integration
        run: go test -tags=integration -count=1 -v ./integration/...
